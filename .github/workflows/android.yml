name: Build Smart Trash Bin APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Fix Project Structure
        run: |
          # 如果 src 文件夹在根目录，强行把它挪进 app 文件夹，伪造成标准结构
          if [ -d "src" ]; then
            mkdir -p app
            mv src app/
            # 如果 build.gradle 也在根目录，挪进去
            [ -f "build.gradle" ] && cp build.gradle app/
            [ -f "proguard-rules.pro" ] && mv proguard-rules.pro app/
          fi
          chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Trash-Bin-App
          path: "**/build/outputs/apk/debug/*.apk"
