name: Build Smart Trash Bin APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Reconstruct Project Structure
        run: |
          # 1. 如果没有 app 文件夹，就造一个，把散落的零件扔进去
          if [ ! -d "app" ]; then
            mkdir -p app
            [ -d "src" ] && mv src app/
            [ -f "build.gradle" ] && cp build.gradle app/
            [ -f "proguard-rules.pro" ] && mv proguard-rules.pro app/
          fi
          
          # 2. 确保根目录下有一个基本的 settings.gradle，否则机器人不干活
          if [ ! -f "settings.gradle" ]; then
            echo "include ':app'" > settings.gradle
          fi

          # 3. 赋予运行权限
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Trash-Bin-App
          path: "**/build/outputs/apk/debug/*.apk"
