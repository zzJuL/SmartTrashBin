name: Build Smart Trash Bin APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      # 修正路径：由于文件散落在根目录，我们需要手动修复 build.gradle 的内容
      - name: Patch Build File
        run: |
          sed -i 's/apply plugin: .com.android.application./apply plugin: "com.android.application"/' build.gradle
          
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smart-Trash-Bin-App
          path: build/outputs/apk/debug/*.apk
